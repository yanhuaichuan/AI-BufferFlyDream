    <!-- 配置Tailwind自定义幻橙幻蓝色系 -->
    <script>
        tailwind.config = {

                        'fade-in': 'fadeIn 0.6s ease-out forwards',

                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },

                        },

                            '0%': { opacity: '0' },

        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .text-shadow {
                text-shadow: 0 2px 8px rgba(0,0,0,0.15);
            }
            .text-shadow-lg {
                text-shadow: 0 4px 12px rgba(0,0,0,0.3);
            }
            .bg-dream {
                background: linear-gradient(135deg, #FFFBFF 0%, #F5F0FF 100%);
            }
            .bg-dream-card {
                background: rgba(255, 255, 255, 0.7);

            }
            .panel-transition {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .splash-screen {
                opacity: 1;
                transition: opacity 1s ease-out, visibility 1s;
            }
            .splash-screen.fade-out {

            }

                border-left: 4px solid #FF8A9A;

        }
        
        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(120deg); }
            66% { transform: translateY(5px) rotate(240deg); }
        }
        
        @keyframes glow {
            0% { 
                box-shadow: 0 0 20px rgba(255, 138, 154, 0.3);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 40px rgba(255, 138, 154, 0.6);

            }
            100% { 
                box-shadow: 0 0 20px rgba(255, 138, 154, 0.3);
                transform: scale(1);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        .animate-glow {
            animation: glow 3s ease-in-out infinite;
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    </style>
</head>

    <script>
        // API配置
        const API_CONFIG = {
            baseUrl: 'http://10.1.20.40:8002',
            conversationId: '00036f29-2b44-45d2-b5f0-dc37bcAAAAA',
            authToken: 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7ImFwcElkIjoiNjg5YWE2ZWYwNmY2YzEyYmViYWExNmNmIiwiY2xpZW50SWQiOiI2N2U2NzM2ZDE1MmE0NWM0ODE5Y2RmNGEiLCJlbWFpbCI6InRlc3RAdGVzdC50ZXN0IiwiaWQiOiI2ODlhYTZlZjA2ZjZjMTJiZWJhYTE2Y2YiLCJvcGVuaWQiOm51bGwsInBob25lIjoiMTc3Nzc3Nzc3NzciLCJ0eXBlIjoidXNlciIsInVuaW9uaWQiOm51bGwsInVzZXJJZCI6IjY4OWFhNmVmMDZmNmMxMmJlYmFhMTZjZiIsInVzZXJuYW1lIjoidGVzdCJ9LCJleHAiOjE4OTQ4NzU3NzgsImlhdCI6MTc1ODg3NTc3OCwidWlkIjoxMjM0NX0.oFMPRZcQ6hB5lVvKOiAJAPX8iYHTpfy3VACF9IwtiiU'
        };

        // 分页状态
        let currentPage = 1;
        const pageSize = 10;
        let isLoading = false;
        let hasMoreMessages = true;

        // 页面加载完成后隐藏启动画面并加载消息
        window.addEventListener('load', function () {
            setTimeout(() => {
                setTimeout(() => {
                    // 加载初始消息
                    loadMessages();
                },10);
            }, 10);
        });

        // 获取消息列表API
        async function getMessages(page = 1) {
            try {
                const url = `${API_CONFIG.baseUrl}/v1/conversations/${API_CONFIG.conversationId}/messages?page=${page}&page_size=${pageSize}`;
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': API_CONFIG.authToken,
                        'Accept': '*/*',
                        'User-Agent': 'Apifox/1.0.0 (https://apifox.com)',
                        'Host': '10.1.20.40:8002',
                        'Connection': 'keep-alive'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.code === 200) {
                    return data.data;
                } else {
                    throw new Error(data.message || 'API返回错误');
                }
            } catch (error) {
                console.error('获取消息失败:', error);
                showError('获取消息失败，请检查网络连接');
                return null;
            }
        }

        // 加载消息
        async function loadMessages() {
            if (isLoading) return;
            
            isLoading = true;
            
            // 显示加载状态
            document.getElementById('messages-container').innerHTML = '<div class="w-full max-w-3xl mx-auto text-center py-8"><div class="inline-flex items-center space-x-2 text-gray-500"><div class="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div><span>加载消息中...</span></div></div>';

            const data = await getMessages(1);
            
            if (data) {
                const messages = data.list || [];
                
                // 更新分页状态
                if (messages.length < pageSize) {
                    hasMoreMessages = false;
                    document.getElementById('load-more-container').classList.add('hidden');
                } else {
                    hasMoreMessages = true;
                    document.getElementById('load-more-container').classList.remove('hidden');
                }

                // 渲染消息
                renderMessages(messages);
                
                // 更新当前页码
                currentPage = 1;
                
                // 滚动到底部
                setTimeout(() => {
                    document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
                }, 100);
            }
            
            isLoading = false;
        }

        // 显示错误信息
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'w-full max-w-3xl mx-auto bg-red-50 border border-red-200 rounded-2xl p-4 text-red-700 text-sm';
            errorDiv.innerHTML = `<div class="flex items-center space-x-2"><i class="fa fa-exclamation-triangle"></i><span>${message}</span></div>`;
            document.getElementById('messages-container').appendChild(errorDiv);
        }

        // 渲染消息列表
        function renderMessages(messages, prepend = false) {
            const container = document.getElementById('messages-container');
            
            // 清空容器（如果不是追加模式）
            if (!prepend) {
                container.innerHTML = '';
            }
            
            // 对消息进行排序（最新的在后）
            const sortedMessages = messages.sort((a, b) => {
                return new Date(a.created_at) - new Date(b.created_at);
            });
            
            // 创建消息元素
            sortedMessages.forEach((message, index) => {
                const messageElement = createMessageElement(message, index);
                
                if (prepend) {
                    container.insertBefore(messageElement, container.firstChild);
                } else {
                    container.appendChild(messageElement);
                }
            });
            
            // 如果不是追加模式，滚动到底部
            if (!prepend) {
                setTimeout(() => {
                    document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
                }, 100);
            }
        }

        // 创建单个消息元素
        function createMessageElement(message, index) {
            const messageDiv = document.createElement('div');
            
            // 设置消息元素的ID
            if (message.id) {
                messageDiv.id = message.id;
            }
            
            // 根据角色设置不同的样式
            if (message.role === 'user') {
                // 用户消息
                messageDiv.className = 'w-full max-w-3xl mx-auto flex items-start justify-end message-appear';
                messageDiv.style.animationDelay = `${index * 0.1}s`;
                
                messageDiv.innerHTML = `
                    <div class="flex-1 max-w-lg ml-auto">
                        <div class="bg-white rounded-2xl rounded-tr-none p-4 shadow-lg border border-gray-100 transition-all duration-300 hover:shadow-xl">
                            <p class="text-gray-800">${escapeHtml(message.content)}</p>
                        </div>
                        <div class="flex justify-end mt-2 text-xs text-gray-500">
                            <span>${formatTime(message.created_at)}</span>
                        </div>
                    </div>
                    <img src="https://picsum.photos/id/64/40/40" alt="用户头像" class="w-10 h-10 rounded-full ml-3 flex-shrink-0 border-2 border-white shadow-sm transition-transform duration-300 hover:scale-105">
                `;
            } else if (message.role === 'assistant') {
                // 助手消息
                messageDiv.className = 'w-full max-w-3xl mx-auto flex items-start message-appear';
                messageDiv.style.animationDelay = `${index * 0.1}s`;
                
                messageDiv.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gradient-to-r from-secondary to-primary flex items-center justify-center text-white mr-3 flex-shrink-0 shadow-sm transition-transform duration-300 hover:scale-105">
                        <i class="fa fa-butterfly"></i>
                    </div>
                    <div class="flex-1 max-w-lg">
                        <div class="bg-white/80 backdrop-blur-sm rounded-2xl rounded-tl-none p-4 shadow-lg border border-white/40 transition-all duration-300 hover:shadow-xl">
                            <p class="text-gray-800">${escapeHtml(message.content)}</p>
                        </div>
                        <div class="flex justify-start mt-2 text-xs text-gray-500">
                            <span>${formatTime(message.created_at)}</span>
                        </div>
                    </div>
                `;
            }
            
            return messageDiv;
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '';
            
            try {
                const date = new Date(timestamp);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMs / 3600000);
                const diffDays = Math.floor(diffMs / 86400000);
                
                if (diffMins < 1) {
                    return '刚刚';
                } else if (diffMins < 60) {
                    return `${diffMins}分钟前`;
                } else if (diffHours < 24) {
                    return `${diffHours}小时前`;
                } else if (diffDays < 7) {
                    return `${diffDays}天前`;
                } else {
                    return date.toLocaleDateString('zh-CN');
                }
            } catch (error) {
                return timestamp;
            }
        }

        // 按钮事件监听器
        document.addEventListener('DOMContentLoaded', function() {
            const loadMoreBtn = document.getElementById('load-more-btn');
            if (loadMoreBtn) {
                loadMoreBtn.addEventListener('click', function() {
                    loadMoreMessages();
                });
            }
        });

        // 清除按钮点击事件
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent.includes('清除')) {
                button.addEventListener('click', function() {
                    const textarea = document.querySelector('#message-input');
                    if (textarea) {
                        textarea.value = '';
                        textarea.style.height = 'auto';
                        textarea.style.height = textarea.scrollHeight + 'px';
                    }
                });
            }
        });

        // 发送按钮点击事件
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent.includes('发送')) {
                button.addEventListener('click', function() {
                    const textarea = document.querySelector('#message-input');
                    if (textarea && textarea.value.trim()) {
                        sendMessage(textarea.value.trim());
                    }
                });
            }
        });

        // 发送消息函数
        async function sendMessage(message) {
            if (!message.trim()) return;

            // 禁用发送按钮，防止重复发送
            let sendButton = null;
            document.querySelectorAll('button').forEach(button => {
                if (button.textContent.includes('发送')) {
                    sendButton = button;
                }
            });
            
            if (sendButton) {
                sendButton.disabled = true;
                sendButton.classList.add('opacity-70', 'cursor-not-allowed');
            }

            try {
                // 显示用户消息
                const userMessage = {
                    id: Date.now(),
                    content: message,
                    role: 'user',
                    created_at: new Date().toISOString()
                };

                // 将用户消息添加到消息列表
                const messagesContainer = document.getElementById('messages-container');
                if (messagesContainer) {
                    const messageElement = createMessageElement(userMessage);
                    messagesContainer.appendChild(messageElement);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }

                // 调用API发送消息
                const response = await fetch(`${API_CONFIG.baseUrl}/v1/conversations/${API_CONFIG.conversationId}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': API_CONFIG.authToken
                    },
                    body: JSON.stringify({
                        content: message,
                        role: 'user',
                        type: 'text'
                    })
                });

                const data = await response.json();

                if (data.code === 200 && data.data && data.data.id) {
                    // 消息发送成功，调用AI生成接口获取回复
                    console.log('用户消息发送成功，messageId:', data.data.id);
                    
                    // 清除输入框内容
                    const textarea = document.querySelector('#message-input');
                    if (textarea) {
                        textarea.value = '';
                        textarea.style.height = 'auto';
                        textarea.style.height = textarea.scrollHeight + 'px';
                    }
                    
                    // 调用AI生成接口获取回复
                    await callAIGenerateAPI(data.data.id);
                    
                } else {
                    throw new Error(data.message || '发送消息失败');
                }

            } catch (error) {
                console.error('发送消息出错:', error);
                showError('发送消息失败，请稍后重试');
            } finally {
                // 恢复发送按钮状态
                if (sendButton) {
                    setTimeout(() => {
                        sendButton.disabled = false;
                        sendButton.classList.remove('opacity-70', 'cursor-not-allowed');
                    }, 1000);
                }
            }
        }

        // 调用AI生成接口获取回复
        async function callAIGenerateAPI(messageId) {
            // 显示AI回复的占位符
            const assistantMessageId = 'assistant-message-' + Date.now();
            const messagesContainer = document.getElementById('messages-container');
            
            if (messagesContainer) {
                const assistantMessage = {
                    id: assistantMessageId,
                    content: '思考中...',
                    role: 'assistant',
                    created_at: new Date().toISOString()
                };
                
                const messageElement = createMessageElement(assistantMessage);
                messagesContainer.appendChild(messageElement);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            try {
                console.log('调用AI生成接口，messageId:', messageId);

                // 调用AI生成接口（使用流式响应）
                const response = await fetch('http://10.1.20.40:8003/v1/chat/stream/game/text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': API_CONFIG.authToken
                    },
                    body: JSON.stringify({
                        messageId: messageId,
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullResponse = '';
                let isFinished = false;

                function readStream() {
                    return reader.read().then(({ done, value }) => {
                        if (done) {
                            // 完成处理
                            isFinished = true;
                            return;
                        }

                        // 处理接收到的数据
                        const chunk = decoder.decode(value, { stream: true });
                        console.log('接收到数据块:', chunk);

                        // 处理标准SSE格式响应（data: {json}）
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (!trimmedLine) continue;

                            // 检查是否是标准SSE data事件格式
                            if (trimmedLine.startsWith('data:')) {
                                // 提取JSON部分（去掉'data: '前缀）
                                const jsonStr = trimmedLine.substring(5).trim();
                                
                                try {
                                    // 解析JSON数据
                                    const data = JSON.parse(jsonStr);
                                    console.log('解析成功的数据:', data);

                                    // 检查是否有content字段
                                    if (data.content && !data.isFinished) {
                                        // 累加响应内容
                                        fullResponse += data.content;
                                        console.log('累计响应内容:', fullResponse);

                                        // 更新AI回复内容
                                        const assistantMessageElement = document.getElementById(assistantMessageId);
                                        if (assistantMessageElement) {
                                            const contentElement = assistantMessageElement.querySelector('p.text-gray-800');
                                            if (contentElement) {
                                                contentElement.textContent = fullResponse;
                                            }
                                        }
                                    }

                                    // 检查是否完成
                                    if (data.isFinished) {
                                        isFinished = true;
                                        console.log('接收到完成标记');
                                        
                                        // 完成时更新UI状态
                                        const assistantMessageElement = document.getElementById(assistantMessageId);
                                        if (assistantMessageElement) {
                                            // 移除思考状态
                                            const thinkingElement = assistantMessageElement.querySelector('.thinking-indicator');
                                            if (thinkingElement) {
                                                thinkingElement.remove();
                                            }
                                            
                                            // 确保内容正确显示
                                            const contentElement = assistantMessageElement.querySelector('p.text-gray-800');
                                            if (contentElement) {
                                                contentElement.textContent = fullResponse;
                                            }
                                        }
                                    }
                                } catch (e) {
                                    console.error('解析JSON错误:', e, '原始数据:', jsonStr);
                                }
                            } else {
                                // 尝试直接解析整行作为JSON（备用方案）
                                try {
                                    const data = JSON.parse(trimmedLine);
                                    console.log('直接解析JSON成功:', data);

                                    if (data.content && !data.isFinished) {
                                        fullResponse += data.content;
                                        console.log('累计响应内容:', fullResponse);

                                        // 更新AI回复内容
                                        const assistantMessageElement = document.getElementById(assistantMessageId);
                                        if (assistantMessageElement) {
                                            const contentElement = assistantMessageElement.querySelector('p.text-gray-800');
                                            if (contentElement) {
                                                contentElement.textContent = fullResponse;
                                            }
                                        }
                                    }

                                    if (data.isFinished) {
                                        isFinished = true;
                                        console.log('接收到完成标记');
                                    }
                                } catch (e) {
                                    console.error('直接解析失败:', e, '原始数据:', trimmedLine);
                                }
                            }
                        }

                        // 继续读取流
                        return readStream();
                    });
                }

                return readStream();
                
            } catch (error) {
                console.error('调用AI生成接口出错:', error);
                showError('获取AI回复失败，请稍后重试');
                
                // 更新AI回复为错误信息
                const assistantMessageElement = document.getElementById(assistantMessageId);
                if (assistantMessageElement) {
                    const contentElement = assistantMessageElement.querySelector('p.text-gray-800');
                    if (contentElement) {
                        contentElement.textContent = '抱歉，获取回复时出现错误';
                        contentElement.classList.add('text-red-500');
                    }
                }
            }
        }

        // 滚动加载检测
        let scrollTimeout;
        document.getElementById('chat-container').addEventListener('scroll', function() {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                checkScrollForLoadMore();
            }, 100);
        });

        // 检查是否需要加载更多消息
        function checkScrollForLoadMore() {
            const container = document.getElementById('chat-container');
            const scrollTop = container.scrollTop;
            
            // 如果滚动到顶部附近且有更多消息，加载更多
            if (scrollTop < 100 && hasMoreMessages && !isLoading) {
                loadMoreMessages();
            }
        }

        // 加载更多消息
        async function loadMoreMessages() {
            if (isLoading || !hasMoreMessages) return;
            
            isLoading = true;
            const nextPage = currentPage + 1;
            
            // 显示加载更多状态
            const loadMoreBtn = document.getElementById('load-more-btn');
            const originalText = loadMoreBtn.innerHTML;
            loadMoreBtn.innerHTML = '<div class="inline-flex items-center space-x-2"><div class="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin"></div><span>加载中...</span></div>';
            loadMoreBtn.disabled = true;
            
            // 记录当前滚动位置
            const container = document.getElementById('chat-container');
            const firstMessage = container.querySelector('#messages-container > div:first-child');
            const scrollOffset = firstMessage ? firstMessage.offsetTop - container.scrollTop : 0;
            
            try {
                const data = await getMessages(nextPage);
                
                if (data) {
                    const messages = data.list || [];
                    
                    // 更新分页状态
                    if (messages.length < pageSize) {
                        hasMoreMessages = false;
                        document.getElementById('load-more-container').classList.add('hidden');
                    }
                    
                    if (messages.length > 0) {
                        // 渲染消息到顶部
                        renderMessages(messages, true);
                        
                        // 更新当前页码
                        currentPage = nextPage;
                        
                        // 恢复滚动位置
                        if (firstMessage) {
                            const newFirstMessage = container.querySelector('#messages-container > div:first-child');
                            if (newFirstMessage) {
                                container.scrollTop = newFirstMessage.offsetTop - scrollOffset;
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('加载更多消息失败:', error);
                showError('加载更多消息失败，请重试');
            } finally {
                // 恢复按钮状态
                loadMoreBtn.innerHTML = originalText;
                loadMoreBtn.disabled = false;
                isLoading = false;
            }
        }

        // 智能体选择功能
        document.querySelectorAll('.agent-item').forEach(item => {
            item.addEventListener('click', function () {
                // 移除所有active状态
                document.querySelectorAll('.agent-item').forEach(i => {
                    i.classList.remove('agent-active');
                });
                // 添加当前active状态
                this.classList.add('agent-active');

                // 更新顶部智能体信息
                const agentName = this.querySelector('h3').textContent;
                const agentDesc = this.querySelector('p').textContent;
                document.querySelector('header h2').textContent = agentName;
                document.querySelector('header p').textContent = agentDesc + ' · 在线';

                // 切换智能体时刷新消息列表
                loadMessages();
            });
        });

        // 响应式面板切换
        document.getElementById('toggle-agent-panel').addEventListener('click', function () {
            document.getElementById('agent-panel').classList.toggle('hidden');
        });

        // 文本输入框自动调整高度
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });



        // 清除按钮功能
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent === '清除') {
                button.addEventListener('click', function() {
                    textarea.value = '';
                    textarea.style.height = 'auto';
                });
            }
        });

        // 消息发送功能
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent === '发送') {
                button.addEventListener('click', function () {
                    const message = textarea.value.trim();
                    if (message) {
                        // 添加用户消息
                        const chatContainer = document.getElementById('chat-container');
                        const userMessage = document.createElement('div');
                        userMessage.className = 'w-full max-w-3xl mx-auto flex items-start justify-end message-appear';
                        userMessage.innerHTML = `
                    <div class="flex-1 max-w-lg ml-auto">
                        <div class="bg-gradient-to-r from-primary to-secondary text-white rounded-2xl rounded-tr-none p-4 shadow-md relative">
                            <p>${message}</p>
                            <div class="absolute -bottom-2 right-4 w-3 h-3 bg-gradient-to-r from-primary to-secondary transform rotate-45"></div>
                        </div>
                        <div class="flex justify-end mt-3 space-x-3">
                            <button class="text-gray-500 hover:text-primary text-xs transition-colors">
                                <i class="fa fa-copy"></i>
                            </button>
                            <button class="text-gray-500 hover:text-primary text-xs transition-colors">
                                <i class="fa fa-heart-o"></i>
                            </button>
                        </div>
                    </div>
                    <img src="https://picsum.photos/id/64/40/40" alt="用户头像" class="w-10 h-10 rounded-full ml-3 flex-shrink-0 border-2 border-white shadow-sm">
                `;
                        chatContainer.appendChild(userMessage);

                        // 清空输入框
                        textarea.value = '';
                        textarea.style.height = 'auto';

                        // 滚动到底部
                        chatContainer.scrollTop = chatContainer.scrollHeight;

                        // 模拟智能体回复
                        setTimeout(() => {
                            const agentMessage = document.createElement('div');
                            agentMessage.className = 'w-full max-w-3xl mx-auto flex items-start message-appear';
                            agentMessage.innerHTML = `
                        <div class="w-10 h-10 rounded-full bg-gradient-to-r from-secondary to-primary flex items-center justify-center text-white mr-3 flex-shrink-0 shadow-sm">
                            <i class="fa fa-butterfly"></i>
                        </div>
                        <div class="flex-1 max-w-lg">
                            <div class="bg-dream-card border border-white/30 rounded-2xl rounded-tl-none p-4 shadow-md relative">
                                <p>这是一个模拟回复。在实际应用中，这里会显示智能体的真实回复内容。</p>
                                <div class="absolute -bottom-2 left-4 w-3 h-3 bg-white border border-white/30 transform rotate-45"></div>
                            </div>
                            <div class="flex justify-start mt-3 space-x-3">
                                <button class="text-gray-500 hover:text-secondary text-xs transition-colors">
                                    <i class="fa fa-copy"></i>
                                </button>
                                <button class="text-gray-500 hover:text-secondary text-xs transition-colors">
                                    <i class="fa fa-download"></i>
                                </button>
                                <button class="text-gray-500 hover:text-secondary text-xs transition-colors">
                                    <i class="fa fa-share-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                            chatContainer.appendChild(agentMessage);
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }, 1000);
                    }
                });
            }
        });
    </script>
